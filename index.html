<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Terraflux Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>
<img src="img/logo.png" class="logo">
<img src="img/hoja.png" class="hoja">
<div class="background"></div>
<div class="particles">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>


<div class="container">

    <!-- Header -->
    <div class="header">

        

        <div class="slogan">

            <div class="line"></div>

            <span>
                CULTIVANDO  EL FUTURO
            </span>

            <div class="line"></div>

        </div>

    </div>


    <!-- Centro -->
    <div class="center">

        <!-- Clima -->
        <div class="weather">

           <div class="weatherIcon">

    <i id="weatherIcon"
       class="fa-solid fa-cloud-sun">

    </i>

</div>

            <div class="temp" id="temp">
                24°C
            </div>

            <div class="condition" id="condition">
                PARCIALMENTE NUBLADO
            </div>

           <div class="city">

    <i class="fa-solid fa-location-dot"></i>

    <span id="city">
        EL CAJON, LAGOS DE MORENO
    </span>

</div>

        </div>


        <!-- Línea -->
        <div class="divider"></div>


        <!-- Hora -->
        <div class="clockArea">
<div id="greeting">

    BUENAS TARDES, TERRAFLUX

</div>
           <div class="clock">

 <div class="hours">

    <span id="hh" class="timeNumber">12</span>

    <span class="colon">:</span>

    <span id="mm" class="timeNumber">17</span>

</div>

<div class="seconds" id="ss">

    42

</div>

</div>

           <div class="date" id="date">

    DOMINGO, 8 DE JUNIO DE 2026

</div>

        </div>

    </div>


    <!-- Tarjetas -->
    <div class="cards">

        <div class="card">

            <i class="fa-solid fa-temperature-half"></i>

            <div>

                <div class="title">
                    SENSACIÓN
                </div>

                <div class="value">
                    24°C
                </div>

            </div>

        </div>

        <div class="card">

            <i class="fa-solid fa-droplet"></i>

            <div>

                <div class="title">
                    HUMEDAD
                </div>

                <div class="value">
                    48%
                </div>

            </div>

        </div>

        <div class="card">

            <i class="fa-solid fa-wind"></i>

            <div>

                <div class="title">
                    VIENTO
                </div>

                <div class="value">
                    13 km/h
                </div>

            </div>

        </div>

        <div class="card">

            <i class="fa-solid fa-gauge-high"></i>

            <div>

                <div class="title">
                    PRESIÓN
                </div>

                <div class="value">
                    1015 hPa
                </div>

            </div>

        </div>

    </div>

</div>
<div class="wave wave1"></div>
<div class="wave wave2"></div>
<div class="wave wave3"></div>
<div class="wave wave4"></div>
<div class="wave wave5"></div>
<div class="leaf"></div>
<script src="script.js"></script>

</body>
</html>
